# =============================================================================
# Chapter 99 Subheading to Authority Mapping
# =============================================================================
#
# Maps HTS Chapter 99 subheadings (found in footnotes) to tariff authorities.
# Each entry specifies:
#   - authority: The legal authority (section_232, section_301, ieepa, etc.)
#   - sub_authority: Specific program within authority
#   - rate: The additional duty rate
#   - countries: Which countries this applies to (default: all)
#   - effective_date: When the duty took effect
#   - proclamation: Reference to proclamation or executive order
#
# =============================================================================

