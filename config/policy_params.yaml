# --- Floor rate structure (EU, Japan, S. Korea) ---
floor_rates:
  eu_floor: 0.15
  floor_rate: 0.15
  floor_countries: ['5880', '5800']   # Japan, South Korea

# --- Authority name to rate column mapping ---
authority_columns:
  section_232:      rate_232
  section_301:      rate_301
  ieepa_reciprocal: rate_ieepa_recip
  ieepa_fentanyl:   rate_ieepa_fent
  other:            rate_other

