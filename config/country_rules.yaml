# -----------------------------------------------------------------------------
# Section 232 Exemptions
# -----------------------------------------------------------------------------
# Countries exempt from Section 232 steel/aluminum tariffs
# (Note: Exemptions have changed over time; these are current as of 2025)

section_232_exemptions:
  steel:
    # USMCA partners currently exempt via quota
    - '1220'  # Canada
    - '2010'  # Mexico
    # Bilateral agreements
    - '6021'  # Australia
    - '5800'  # Korea, South
    - '3030'  # Argentina (quota)
    - '3510'  # Brazil (quota)

  aluminum:
    - '1220'  # Canada
    - '2010'  # Mexico
    - '6021'  # Australia

# -----------------------------------------------------------------------------
# IEEPA Exemptions
# -----------------------------------------------------------------------------
# Countries exempt from various IEEPA provisions

ieepa_exemptions:
  reciprocal:
    # De minimis exemptions
    exempt_categories:
      - usmca_content  # Goods meeting USMCA rules of origin
      - duty_free_treatment  # Certain FTA goods

  fentanyl:
    # No blanket exemptions - applied to specified countries only
    applicable_countries:
      - '5700'  # China
      - '1220'  # Canada
      - '2010'  # Mexico

# -----------------------------------------------------------------------------
# Stacking Rules
# -----------------------------------------------------------------------------
# How different authorities combine when multiple apply to the same product
#
# Key rules from Tariff-ETRs:
#   - China: max(232, reciprocal) + fentanyl + 301 + s122
#   - Others: (232 > 0 ? 232 : reciprocal + fentanyl) + s122
#   - Section 122 always stacks on top of everything

stacking_rules:
  # China has unique stacking - fentanyl and 301 stack on top
  china:
    base: max(section_232, ieepa_reciprocal)
    stacking:
      - ieepa_fentanyl
      - section_301
      - section_122

  # Canada and Mexico - USMCA considerations
  usmca:
    base: max(section_232, ieepa_reciprocal)
    stacking:
      - ieepa_fentanyl  # If applicable
      - section_122

  # All other countries
  default:
    # 232 is mutually exclusive with IEEPA reciprocal
    base: 'if section_232 > 0 then section_232 else (ieepa_reciprocal + ieepa_fentanyl)'
    stacking:
      - section_122

# -----------------------------------------------------------------------------
# MFN vs Column 2 Countries
# -----------------------------------------------------------------------------
# Most countries receive MFN (Column 1) treatment
# Column 2 rates apply to non-market economies without NTR status

column_2_countries:
  - '5310'  # Cuba
  - '5370'  # North Korea

